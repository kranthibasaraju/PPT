# docker-compose.yml — PPT root services
#
# WHY this file exists at the repo root:
#   The deploy workflow does `docker compose -f docker-compose.yml up --build -d`
#   from the repo root. This file is the single source of truth for what runs
#   on the server. Add a new service here and the next deploy picks it up.
#
# HOW deploys work:
#   --build         → rebuilds images only when Dockerfile or code changed (Docker layer cache)
#   -d              → detached, runner doesn't block waiting for output
#   --remove-orphans → removes containers for services you deleted from this file

services:

  ppt-notify:
    build:
      context: ./staging/ppt-notify
      dockerfile: Dockerfile
    container_name: ppt-notify
    restart: unless-stopped
    env_file:
      - ./staging/ppt-notify/.env
    volumes:
      # WHY shared volume: ppt-notify writes to notify.db + journal.db
      # ppt-board reads the same DBs — they must share the same data directory
      - ppt-data:/app/data
    labels:
      - "ppt.service=notify"

  ppt-board:
    build:
      context: .
      dockerfile: Dockerfile.board
    container_name: ppt-board
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - ./staging/ppt-notify/.env   # shares same secrets (Telegram, secret key)
    environment:
      - PPT_SECRET_KEY=${PPT_SECRET_KEY:-ppt-change-me}
    volumes:
      # WHY same volume as ppt-notify: board reads notify.db, projects.db, journal.db
      # Both containers see /app/data — one writes, one reads, SQLite WAL handles concurrency
      - ppt-data:/app/data
    depends_on:
      - ppt-notify
    labels:
      - "ppt.service=board"

  # ppt-voice — uncomment when it has a Dockerfile
  # ppt-voice:
  #   build:
  #     context: ./staging/ppt-voice
  #     dockerfile: Dockerfile
  #   container_name: ppt-voice
  #   restart: unless-stopped
  #   env_file:
  #     - ./staging/ppt-voice/.env
  #   devices:
  #     - /dev/snd:/dev/snd
  #   labels:
  #     - "ppt.service=voice"

volumes:
  ppt-data:
    name: ppt-data
    # WHY renamed from ppt-notify-data: both services share this volume now
    # external: true  ← uncomment after first deploy to protect from accidental pruning
